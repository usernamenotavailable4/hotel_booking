<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YOYO Hotels — Home</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">
  <!-- Navbar -->
  <nav class="flex items-center justify-between p-6 bg-white shadow">
    <h1 class="text-2xl font-bold text-blue-700">YOYO Hotels</h1>
    <div class="flex gap-4">
      <a class="text-gray-600 hover:text-blue-600">Explore</a>
      <a class="text-gray-600 hover:text-blue-600">Bookings</a>
      <a href="#login" class="px-4 py-2 bg-blue-600 text-white rounded-lg">Login</a>
    </div>
  </nav>

  <!-- Hero Section -->
  <section class="h-[70vh] bg-cover bg-center flex items-center justify-center" style="background-image: url('https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?q=80&w=1400&auto=format&fit=crop');">
    <div class="bg-black bg-opacity-50 p-10 rounded-xl text-center text-white max-w-2xl">
      <h2 class="text-4xl font-bold mb-4">Find & Book Your Ideal Stay</h2>
      <p class="mb-6">Compare real-time prices, availability, and ratings. Book with confidence.</p>

      <!-- Search Bar -->
      <div class="grid grid-cols-1 md:grid-cols-4 gap-4 bg-white p-4 rounded-xl text-black">
        <input placeholder="City / Hotel" class="p-3 border rounded-md" />
        <input type="date" class="p-3 border rounded-md" />
        <select class="p-3 border rounded-md">
          <option>2 Adults</option><option>1 Adult</option><option>3 Adults</option>
        </select>
        <button class="bg-blue-600 text-white rounded-md p-3 font-semibold">Search</button>
      </div>
    </div>
  </section>

  <!-- Filters + Grid -->
  <div class="grid grid-cols-1 md:grid-cols-4 gap-6 p-6">

    <!-- Filters -->
    <aside class="bg-white p-6 rounded-xl shadow-md h-max">
      <h3 class="font-bold text-xl mb-4">Filters</h3>

      <div class="mb-4">
        <p class="font-semibold mb-2">Budget (per night)</p>
        <input type="range" min="1000" max="15000" class="w-full" />
      </div>

      <div class="mb-4">
        <p class="font-semibold mb-2">Star Rating</p>
        <div class="flex flex-col gap-2 text-gray-700">
          <label><input type="checkbox" /> 5 Stars</label>
          <label><input type="checkbox" /> 4 Stars</label>
          <label><input type="checkbox" /> 3 Stars</label>
        </div>
      </div>

      <div class="mb-4">
        <p class="font-semibold mb-2">Popular Amenities</p>
        <div class="flex flex-col gap-2 text-gray-700">
          <label><input type="checkbox" /> Free WiFi</label>
          <label><input type="checkbox" /> Breakfast included</label>
          <label><input type="checkbox" /> Swimming Pool</label>
          <label><input type="checkbox" /> Parking</label>
        </div>
      </div>
    </aside>

    <!-- Hotel Grid -->
    <div class="col-span-1 md:col-span-3 grid md:grid-cols-2 lg:grid-cols-3 gap-6" id="hotelGrid">

      <!-- Card Template (JS will replace this) -->

    </div>
  </div>

  <!-- Footer -->
  <footer class="text-center py-6 bg-white shadow mt-10 text-gray-700 font-semibold">
    © 2025 YOYO Hotels — Built by Darren, Ashutosh, Sharon, Adhi
  </footer>

  <script>
    const hotels = [
      { name:'Seaview Paradise', img:'https://images.unsplash.com/photo-1501117716987-c8e7a0a3c3d6?q=80&w=800', price:4200, rating:4.6, distance:'1.2 km' },
      { name:'Urban Comfort Inn', img:'https://images.unsplash.com/photo-1566073771259-6a8506099945?q=80&w=800', price:2500, rating:4.2, distance:'900 m' },
      { name:'City Light Suites', img:'https://images.unsplash.com/photo-1550592704-6c76defa9982?q=80&w=800', price:3100, rating:4.0, distance:'600 m' },
      { name:'Luxury Grand Palace', img:'https://images.unsplash.com/photo-1505691938895-1758d7feb511?q=80&w=800', price:9200, rating:4.9, distance:'450 m' },
      { name:'Mountain Retreat', img:'https://images.unsplash.com/photo-1501785888041-af3ef285b470?q=80&w=800', price:3800, rating:4.5, distance:'7.5 km' },
      { name:'Budget Stay Inn', img:'https://images.unsplash.com/photo-1505691723518-36a5a1bd3e6f?q=80&w=800', price:1800, rating:3.9, distance:'2.5 km' },
    ];

    const grid = document.getElementById('hotelGrid');

    hotels.forEach(h => {
      const card = document.createElement('div');
      card.className = 'bg-white rounded-xl shadow hover:shadow-lg transition overflow-hidden';
      card.innerHTML = `
        <img src="${h.img}" class="h-40 w-full object-cover" />
        <div class="p-4">
          <h2 class="font-bold text-lg">${h.name}</h2>
          <p class="text-gray-600 text-sm">${h.distance} from centre</p>
          <p class="font-bold text-xl mt-2">₹${h.price}</p>
          <p class="text-gray-600 text-sm">Rating: ⭐ ${h.rating}</p>
          <button class="w-full mt-3 bg-blue-600 text-white p-2 rounded-md font-semibold">View Details</button>
        </div>`;
      grid.appendChild(card);
    });
  </script>

</body>
</html>
