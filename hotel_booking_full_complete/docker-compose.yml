version: '3.8'
services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: hotel_db
      MYSQL_ROOT_PASSWORD: example_root_password
      MYSQL_USER: hotel_user
      MYSQL_PASSWORD: hotel_pass
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
  redis:
    image: redis:7
    ports:
      - "6379:6379"
  web:
    build: ./
    command: bash -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./:/code
    ports:
      - "8000:8000"
    environment:
      - DATABASE_HOST=db
      - DATABASE_PORT=3306
      - DATABASE_NAME=hotel_db
      - DATABASE_USER=hotel_user
      - DATABASE_PASSWORD=hotel_pass
      - DJANGO_SECRET_KEY=replace_this_with_a_strong_secret
    depends_on:
      - db
      - redis
volumes:
  db-data:
