{% extends "base.html" %}
{% block title %}{{ hotel.name }}{% endblock %}

{% block content %}
<h1 class="text-3xl font-bold mb-4">{{ hotel.name }}</h1>

<h2 class="text-xl font-semibold mb-2">Rooms</h2>

<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    {% for room in rooms %}
    <div class="bg-white p-4 rounded shadow">
        <h3 class="font-bold text-lg">{{ room.name }}</h3>

        <a href="/book/{{ hotel.id }}/?room={{ room.id }}"
           class="mt-3 inline-block px-4 py-2 bg-green-600 text-white rounded">
            Book Now
        </a>
    </div>
    {% endfor %}
</div>
{% endblock %}
