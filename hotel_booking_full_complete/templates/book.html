{% extends "base.html" %}
{% block title %}Booking{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white p-6 rounded shadow">
    <h2 class="text-2xl font-bold mb-4">Book {{ hotel.name }}</h2>

    <form method="POST">
        {% csrf_token %}

        <label class="block mb-2 font-semibold">Check-in Date</label>
        <input type="date" name="checkin"
               class="w-full px-4 py-2 mb-4 border rounded" required>

        <label class="block mb-2 font-semibold">Check-out Date</label>
        <input type="date" name="checkout"
               class="w-full px-4 py-2 mb-4 border rounded" required>

        <button class="w-full bg-blue-600 text-white py-2 rounded">
            Confirm Booking
        </button>
    </form>
</div>
{% endblock %}
