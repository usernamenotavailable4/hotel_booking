{% extends "base.html" %}

{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded shadow">
    <h2 class="text-2xl font-bold mb-6 text-center">Create an Account</h2>

    <form method="POST">
        {% csrf_token %}

        <label class="block mb-2 font-semibold">Email</label>
        <input type="email" name="email"
               class="w-full px-4 py-2 mb-4 border rounded" required>

        <label class="block mb-2 font-semibold">Password</label>
        <input type="password" name="password"
               class="w-full px-4 py-2 mb-6 border rounded" required>

        <button class="w-full bg-green-600 text-white py-2 rounded">Register</button>
    </form>

    <p class="mt-4 text-center">
        Already have an account?
        <a href="/login/" class="text-blue-600">Login</a>
    </p>
</div>
{% endblock %}
