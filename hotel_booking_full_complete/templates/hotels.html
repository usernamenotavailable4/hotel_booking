{% extends "base.html" %}
{% block title %}Hotels{% endblock %}

{% block content %}
<h1 class="text-3xl font-bold mb-6">Available Hotels</h1>

<div class="grid grid-cols-1 md:grid-cols-3 gap-6">
    {% for hotel in hotels %}
    <div class="bg-white shadow rounded p-4 hover:shadow-lg transition">
        <h3 class="text-xl font-bold">{{ hotel.name }}</h3>
        <p class="text-gray-500">Stars: {{ hotel.star_rating }}</p>

        <a href="/hotels/{{ hotel.id }}/"
           class="mt-4 inline-block px-4 py-2 bg-blue-500 text-white rounded">
            View Details
        </a>
    </div>
    {% endfor %}
</div>
{% endblock %}
